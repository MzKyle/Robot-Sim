<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">robot_sim cover</title>
  <desc id="desc">A minimal robot arm drawing a validation check mark for the robot_sim ROS 2 simulation toolkit.</desc>
  <rect width="1600" height="520" fill="#071018" />
  <path d="M 0 420 L 1600 260 L 1600 520 L 0 520 Z" fill="#EAF2F5" />
  <path d="M 0 424 L 1600 264" fill="none" stroke="#17D9C3" stroke-width="4" stroke-opacity="0.85" />

  <g transform="translate(118 105)">
    <text x="0" y="88" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="86" font-weight="800">robot_sim</text>
    <rect x="4" y="122" width="295" height="8" rx="4" fill="#17D9C3" />
    <rect x="318" y="122" width="56" height="8" rx="4" fill="#FFB000" />
    <text x="0" y="178" fill="#B8CAD2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="600">ROS 2 robot simulation acceptance</text>
    <text x="0" y="224" fill="#718793" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">GAZEBO / MOVEIT / ROS2_CONTROL</text>
