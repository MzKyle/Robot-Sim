name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  ROS_DISTRO: humble
  GZ_VERSION: harmonic
  DEBIAN_FRONTEND: noninteractive

jobs:
  deb:
    name: Build deb and publish release
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Add Gazebo apt repository
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg lsb-release
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] https://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null

      - name: Setup ROS
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ env.ROS_DISTRO }}

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fakeroot \
            gz-harmonic \
            libgz-plugin2-dev \
            libgz-sim8-dev \
            python3-colcon-common-extensions \
            python3-jsonschema \
            python3-rosdep \
            python3-yaml \
            ros-${ROS_DISTRO}-controller-manager \
            ros-${ROS_DISTRO}-joint-state-broadcaster \
            ros-${ROS_DISTRO}-joint-trajectory-controller \
            ros-${ROS_DISTRO}-moveit \
            ros-${ROS_DISTRO}-robot-state-publisher \
            ros-${ROS_DISTRO}-ros-gzharmonic \
            ros-${ROS_DISTRO}-ros2-control \
            ros-${ROS_DISTRO}-rviz2 \
            ros-${ROS_DISTRO}-urdfdom \
            ros-${ROS_DISTRO}-xacro \
            ros-${ROS_DISTRO}-urdfdom-py

      - name: Build deb
        run: |
          version="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="${version}" bash packaging/build_deb.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          notes="robot_sim ${tag} release. Debian package for ROS 2 Humble + Gazebo Harmonic is attached."
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/*.deb --clobber
          else
            gh release create "${tag}" dist/*.deb \
              --title "robot_sim ${tag}" \
              --notes "${notes}"
          fi

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-sim-deb
          path: dist/*.deb
          if-no-files-found: ignore
          retention-days: 14
