name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ROS_DISTRO: humble
  GZ_VERSION: harmonic
  DEBIAN_FRONTEND: noninteractive
  ROBOT_SIM_PACKAGES: >-
    gz_ros2_control
    robot_sim_description
    robot_sim_control
    robot_sim_scenarios
    robot_sim_moveit_config
    robot_sim_sensor_camera
    robot_sim_sensor_depth
    robot_sim_sensor_lidar
    robot_sim_sensor_imu
    robot_sim_bringup
    robot_task_interfaces
    simulation_interfaces

jobs:
  build-test:
    name: Build, test, and lint
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Add Gazebo apt repository
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg lsb-release
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] https://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null

      - name: Setup ROS
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ env.ROS_DISTRO }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gz-harmonic \
            libgz-plugin2-dev \
            libgz-sim8-dev \
            python3-colcon-common-extensions \
            python3-colcon-override-check \
            python3-pytest \
            python3-rosdep \
            python3-yaml \
            ros-${ROS_DISTRO}-controller-manager \
            ros-${ROS_DISTRO}-joint-state-broadcaster \
            ros-${ROS_DISTRO}-joint-trajectory-controller \
            ros-${ROS_DISTRO}-moveit \
            ros-${ROS_DISTRO}-robot-state-publisher \
            ros-${ROS_DISTRO}-ros-gzharmonic \
            ros-${ROS_DISTRO}-ros2-control \
            ros-${ROS_DISTRO}-rviz2 \
            ros-${ROS_DISTRO}-urdfdom \
            ros-${ROS_DISTRO}-xacro \
            ros-${ROS_DISTRO}-urdfdom-py
          sudo rosdep init 2>/dev/null || true
          rosdep update --rosdistro "${ROS_DISTRO}"
          rosdep install --from-paths \
              src/core src/sensors src/interfaces src/vendor/gz_ros2_control/gz_ros2_control \
              --ignore-src --rosdistro "${ROS_DISTRO}" -r -y \
            --skip-keys "gz-plugin2 gz-sim8 ros_gz_bridge ros_gz_sim"

      - name: Build workspace
        run: |
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          colcon list --names-only
          colcon build --symlink-install \
            --allow-overriding gz_ros2_control \
            --packages-select ${ROBOT_SIM_PACKAGES}

      - name: Run package tests
        run: |
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          source install/setup.bash
          colcon test --packages-select robot_sim_bringup robot_sim_scenarios \
            --event-handlers console_direct+
          colcon test-result --verbose

      - name: Run profile lint
        run: |
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          source install/setup.bash
          for profile in panda fanuc_m20id12l fanuc_m20id12l_industrial_cell; do
            ros2 run robot_sim_bringup profile_lint \
              --profile "${profile}" \
              --mode full \
              --require-moveit \
              --require-receivers
          done

      - name: Run mock smoke test
        run: |
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          source install/setup.bash
          scripts/sim_smoke_test.sh --profile panda --mode mock --timeout 60 --keep-logs

      - name: Upload colcon logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-colcon-logs
          path: |
            log/
            build/*/test_results/
          if-no-files-found: ignore
          retention-days: 14
