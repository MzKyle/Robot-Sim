schema: 4
kind: validation_case
name: detector_video_replay
description: Replay a camera stream and validate the RM detector armors interface contract.
system:
  profile: rm_vision_stub
inputs:
  - type: data_source
    name: camera_replay
    source: rm_blank_camera
  - type: data_source
    name: detector_armors_stub
    source: rm_detector_armors_sample
assertions:
  - name: detector_armors_topic
    type: topic
    topic: /detector/armors
    message_type: auto_aim_interfaces/msg/Armors
    min_count: 1
    timeout_sec: 3.0
    expect:
      header.frame_id:
        equals: camera_optical_frame
      armors:
        len_min: 1
artifacts:
  rosbag:
    enabled: false
  reports: [md, html, json]
