schema: 4
kind: validation_case
name: trajectory_serial_stub
description: Replay target and joint state inputs and validate the RM trajectory send interface contract.
system:
  profile: rm_vision_stub
inputs:
  - type: data_source
    name: tracker_target_replay
    source: rm_tracker_target_sample
  - type: data_source
    name: joint_states_replay
    source: rm_joint_states_zero
  - type: data_source
    name: current_velocity_replay
    source: rm_current_velocity_zero
  - type: data_source
    name: trajectory_send_stub
    source: rm_trajectory_send_sample
assertions:
  - name: trajectory_send_topic
    type: topic
    topic: /trajectory/send
    message_type: auto_aim_interfaces/msg/Send
    min_count: 1
    timeout_sec: 3.0
    expect:
      is_fire:
        exists: true
      yaw:
        abs_max: 6.28319
artifacts:
  rosbag:
    enabled: false
  reports: [md, html, json]
