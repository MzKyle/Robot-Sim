schema: 4
kind: data_source
name: rm_detector_armors_sample
description: Sample RM detector armor output.
type: message_sequence
topic: /detector/armors
message_type: auto_aim_interfaces/msg/Armors
rate_hz: 20.0
loop: true
messages:
  - header:
      frame_id: camera_optical_frame
    armors:
      - number: "1"
        type: small
        distance_to_image_center: 0.0
        pose:
          position:
            x: 0.2
            y: 0.0
            z: 3.0
          orientation:
            x: 0.0
            y: 0.0
            z: 0.0
            w: 1.0
