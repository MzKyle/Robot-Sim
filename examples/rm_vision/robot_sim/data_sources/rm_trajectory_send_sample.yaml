schema: 4
kind: data_source
name: rm_trajectory_send_sample
description: Sample trajectory send output for serial interface smoke.
type: message_sequence
topic: /trajectory/send
message_type: auto_aim_interfaces/msg/Send
rate_hz: 20.0
loop: true
messages:
  - header:
      frame_id: odom
    is_fire: false
    pitch: 0.0
    yaw: 0.0
    vel_yaw: 0.0
    acc_yaw: 0.0
    idx: 0
    num: 1
