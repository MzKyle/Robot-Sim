schema: 4
kind: data_source
name: rm_joint_states_zero
description: Minimal joint state stream for RM trajectory interface smoke.
type: message_sequence
topic: /joint_states
message_type: sensor_msgs/msg/JointState
rate_hz: 20.0
loop: true
messages:
  - name: [yaw_joint, pitch_joint]
    position: [0.0, 0.0]
    velocity: [0.0, 0.0]
    effort: [0.0, 0.0]
