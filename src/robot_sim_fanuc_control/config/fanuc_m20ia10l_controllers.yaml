/**/controller_manager:
  ros__parameters:
    update_rate: 250

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

/**/joint_state_broadcaster:
  ros__parameters:
    use_local_topics: false

/**/arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    open_loop_control: false
    allow_nonzero_velocity_at_trajectory_end: false
    constraints:
      goal_time: 3.0
      stopped_velocity_tolerance: 0.05
      joint_1:
        trajectory: 3.2
        goal: 0.2
      joint_2:
        trajectory: 3.2
        goal: 0.2
      joint_3:
        trajectory: 3.2
        goal: 0.2
      joint_4:
        trajectory: 3.2
        goal: 0.2
      joint_5:
        trajectory: 3.2
        goal: 0.2
      joint_6:
        trajectory: 3.2
        goal: 0.2
