schema: 1
name: fanuc_m20id12l

layouts:
  single:
    world: single
    namespaces:
      robot: ""
      sensors: ""
      supervisor: ""
    moveit:
      namespace: ""
      monitored_planning_scene_topic: /monitored_planning_scene
      camera_points_topic: /camera/points
      scan_topic: /scan
  distributed:
    world: distributed
    namespaces:
      robot: robot
      sensors: sensors
      supervisor: supervisor
    moveit:
      namespace: robot
      monitored_planning_scene_topic: /robot/monitored_planning_scene
      camera_points_topic: /sensors/camera/points
      scan_topic: /sensors/scan
    rqt_graph:
      namespace: supervisor
      node_name: supervisor_graph

robot:
  xacro:
    package: robot_sim_description
    path: robots/fanuc_m20id12l.urdf.xacro
  spawn_name: fanuc_m20id12l
  spawn_node_name: spawn_fanuc_m20id12l
  allow_renaming: false
  spawn_pose:
    x: 0.0
    y: 0.0
    z: 0.0
  xacro_args:
    mesh_root:
      package: robot_sim_description
      path: models/robots/fanuc_m20id12l/meshes
      uri: file
    camera_mesh:
      package: robot_sim_description
      path: models/sensors/cameras/rgbd_camera/meshes/3dCamera.DAE
      uri: file

worlds:
  single:
    scenario:
      package: robot_sim_scenarios
      path: scenarios/lab_demo.yaml
  distributed:
    scenario:
      package: robot_sim_scenarios
      path: scenarios/lab_demo.yaml

gazebo:
  launch:
    package: ros_gz_sim
    path: launch/gz_sim.launch.py
  gz_version: "8"
  on_exit_shutdown: "true"
  args:
    gui: "-r "
    headless: "-r -s "
  resource_env_vars:
    - GZ_SIM_RESOURCE_PATH
    - IGN_GAZEBO_RESOURCE_PATH
  resource_paths:
    - package: robot_sim_description
    - package: robot_sim_description
      path: models
    - package: robot_sim_scenarios
    - package: robot_sim_scenarios
      path: assets

control:
  controllers_file:
    package: robot_sim_control
    path: config/fanuc_m20id12l_controllers.yaml
  controller_manager_name: controller_manager
  hardware_plugins:
    gazebo: gz_ros2_control/GazeboSimSystem
    mock: mock_components/GenericSystem
  spawners:
    - name: joint_state_broadcaster
      type: joint_state_broadcaster/JointStateBroadcaster
      timeout: 90
    - name: arm_controller
      type: joint_trajectory_controller/JointTrajectoryController
      timeout: 90

moveit:
  launch:
    package: robot_sim_moveit_config
    path: launch/moveit.launch.py
  robot_xacro:
    package: robot_sim_description
    path: robots/fanuc_m20id12l.urdf.xacro
  srdf_file:
    package: robot_sim_moveit_config
    path: config/fanuc_m20id12l/fanuc_m20id12l.srdf
  kinematics_yaml:
    package: robot_sim_moveit_config
    path: config/fanuc_m20id12l/kinematics.yaml
  joint_limits_yaml:
    package: robot_sim_moveit_config
    path: config/fanuc_m20id12l/joint_limits.yaml
  moveit_controllers_yaml:
    package: robot_sim_moveit_config
    path: config/fanuc_m20id12l/moveit_controllers.yaml
  ompl_planning_yaml:
    package: robot_sim_moveit_config
    path: config/fanuc_m20id12l/ompl_planning.yaml
  rviz_config:
    package: robot_sim_moveit_config
    path: rviz/fanuc_m20id12l_moveit.rviz

bridges:
  - clock

bridge_groups:
  clock:
    node_name: clock_bridge
    namespace: sensors
    topics:
      - ros_topic_name: /clock
        gz_topic_name: /clock
        ros_type_name: rosgraph_msgs/msg/Clock
        gz_type_name: gz.msgs.Clock
        direction: GZ_TO_ROS
  camera:
    node_name: camera_bridge
    namespace: sensors
    topics:
      - ros_topic_name: camera/color/image_raw
        gz_topic_name: /camera/color/image_raw
        ros_type_name: sensor_msgs/msg/Image
        gz_type_name: gz.msgs.Image
        direction: GZ_TO_ROS
      - ros_topic_name: camera/color/camera_info
        gz_topic_name: /camera/color/camera_info
        ros_type_name: sensor_msgs/msg/CameraInfo
        gz_type_name: gz.msgs.CameraInfo
        direction: GZ_TO_ROS
  depth:
    node_name: depth_bridge
    namespace: sensors
    topics:
      - ros_topic_name: camera/depth/image_raw
        gz_topic_name: /camera/depth/depth_image
        ros_type_name: sensor_msgs/msg/Image
        gz_type_name: gz.msgs.Image
        direction: GZ_TO_ROS
      - ros_topic_name: camera/depth/camera_info
        gz_topic_name: /camera/depth/camera_info
        ros_type_name: sensor_msgs/msg/CameraInfo
        gz_type_name: gz.msgs.CameraInfo
        direction: GZ_TO_ROS
      - ros_topic_name: camera/points
        gz_topic_name: /camera/depth/points
        ros_type_name: sensor_msgs/msg/PointCloud2
        gz_type_name: gz.msgs.PointCloudPacked
        direction: GZ_TO_ROS
  lidar:
    node_name: lidar_bridge
    namespace: sensors
    topics:
      - ros_topic_name: scan
        gz_topic_name: /scan
        ros_type_name: sensor_msgs/msg/LaserScan
        gz_type_name: gz.msgs.LaserScan
        direction: GZ_TO_ROS
      - ros_topic_name: lidar/points
        gz_topic_name: /lidar/points
        ros_type_name: sensor_msgs/msg/PointCloud2
        gz_type_name: gz.msgs.PointCloudPacked
        direction: GZ_TO_ROS
  imu:
    node_name: imu_bridge
    namespace: sensors
    topics:
      - ros_topic_name: imu/data
        gz_topic_name: /imu/data
        ros_type_name: sensor_msgs/msg/Imu
        gz_type_name: gz.msgs.IMU
        direction: GZ_TO_ROS

sensors:
  camera:
    xacro_arg: enable_camera
    default_enabled: true
    bridge_group: camera
    receiver:
      package: robot_sim_sensor_camera
      executable: camera_receiver
      type: camera
      expected_min_hz: 1.0
      log_period_sec: 5.0
    static_tfs:
      - name: color_camera
        parent_frame: camera_color_frame
        child_frame: fanuc_m20id12l/camera_mount/color_camera
  depth:
    xacro_arg: enable_depth
    default_enabled: true
    bridge_group: depth
    receiver:
      package: robot_sim_sensor_depth
      executable: depth_receiver
      type: depth
      expected_min_hz: 1.0
      log_period_sec: 5.0
    static_tfs:
      - name: rgbd_camera
        parent_frame: rgbd_camera_frame
        child_frame: fanuc_m20id12l/camera_mount/rgbd_camera
  lidar:
    xacro_arg: enable_lidar
    default_enabled: true
    bridge_group: lidar
    receiver:
      package: robot_sim_sensor_lidar
      executable: lidar_receiver
      type: lidar
      expected_min_hz: 1.0
      log_period_sec: 5.0
    static_tfs:
      - name: lidar_2d
        parent_frame: lidar_2d_frame
        child_frame: fanuc_m20id12l/camera_mount/lidar_2d
      - name: lidar_3d
        parent_frame: lidar_3d_frame
        child_frame: fanuc_m20id12l/camera_mount/lidar_3d
  imu:
    xacro_arg: enable_imu
    default_enabled: true
    bridge_group: imu
    receiver:
      package: robot_sim_sensor_imu
      executable: imu_receiver
      type: imu
      expected_min_hz: 1.0
      log_period_sec: 5.0
    static_tfs:
      - name: imu
        parent_frame: imu_link
        child_frame: fanuc_m20id12l/camera_mount/imu

smoke:
  controllers:
    required:
      - joint_state_broadcaster
      - arm_controller
    primary_trajectory: arm_controller
  sensors:
    min_hz: 1.0
    min_samples: 3
    topic_timeout: 6.0
  tf:
    required_frames: []
