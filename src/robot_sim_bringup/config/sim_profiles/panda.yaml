schema: 1
name: panda

layouts:
  single:
    world: single
    namespaces:
      robot: ""
      sensors: ""
      supervisor: ""
    moveit:
      namespace: ""
      monitored_planning_scene_topic: /monitored_planning_scene
      camera_points_topic: /camera/points
      scan_topic: /scan
  distributed:
    world: distributed
    namespaces:
      robot: robot
      sensors: sensors
      supervisor: supervisor
    moveit:
      namespace: robot
      monitored_planning_scene_topic: /robot/monitored_planning_scene
      camera_points_topic: /sensors/camera/points
      scan_topic: /sensors/scan
    rqt_graph:
      namespace: supervisor
      node_name: supervisor_graph

robot:
  xacro:
    package: robot_sim_description
    path: robots/panda.urdf.xacro
  spawn_name: panda
  spawn_node_name: spawn_panda
  allow_renaming: false
  xacro_args:
    mesh_root:
      package: robot_sim_description
      path: models/panda_arm/meshes
      uri: file
    camera_mesh:
      package: robot_sim_description
      path: models/rgbd_camera/meshes/3dCamera.DAE
      uri: file

worlds:
  single:
    scenario:
      package: robot_sim_scenarios
      path: scenarios/lab_demo.yaml
  distributed:
    scenario:
      package: robot_sim_scenarios
      path: scenarios/lab_demo.yaml

gazebo:
  launch:
    package: ros_gz_sim
    path: launch/gz_sim.launch.py
  gz_version: "8"
  on_exit_shutdown: "true"
  args:
    gui: "-r "
    headless: "-r -s "
  resource_env_vars:
    - GZ_SIM_RESOURCE_PATH
    - IGN_GAZEBO_RESOURCE_PATH
  resource_paths:
    - package: robot_sim_description
    - package: robot_sim_description
      path: models
    - package: robot_sim_scenarios
    - package: robot_sim_scenarios
      path: assets

control:
  controllers_file:
    package: robot_sim_control
    path: config/panda_controllers.yaml
  controller_manager_name: controller_manager
  hardware_plugins:
    gazebo: gz_ros2_control/GazeboSimSystem
    mock: mock_components/GenericSystem
  spawners:
    - name: joint_state_broadcaster
      type: joint_state_broadcaster/JointStateBroadcaster
      timeout: 90
    - name: arm_controller
      type: joint_trajectory_controller/JointTrajectoryController
      timeout: 90
    - name: gripper_controller
      type: joint_trajectory_controller/JointTrajectoryController
      timeout: 90
      enabled_by: use_gripper

moveit:
  launch:
    package: robot_sim_moveit_config
    path: launch/moveit.launch.py
  robot_xacro:
    package: robot_sim_description
    path: robots/panda.urdf.xacro
  srdf_file:
    package: robot_sim_moveit_config
    path: config/panda.srdf
  kinematics_yaml:
    package: robot_sim_moveit_config
    path: config/kinematics.yaml
  joint_limits_yaml:
    package: robot_sim_moveit_config
    path: config/joint_limits.yaml
  moveit_controllers_yaml:
    package: robot_sim_moveit_config
    path: config/moveit_controllers.yaml
  ompl_planning_yaml:
    package: robot_sim_moveit_config
    path: config/ompl_planning.yaml
  rviz_config:
    package: robot_sim_moveit_config
    path: rviz/robot_sim_moveit.rviz

bridges:
  - clock

sensors:
  camera:
    xacro_arg: enable_camera
    default_enabled: true
    bridge_group: camera
    static_tfs:
      - name: color_camera
        parent_frame: camera_color_frame
        child_frame: panda/panda_link7/color_camera
  depth:
    xacro_arg: enable_depth
    default_enabled: true
    bridge_group: depth
    static_tfs:
      - name: rgbd_camera
        parent_frame: rgbd_camera_frame
        child_frame: panda/panda_link7/rgbd_camera
  lidar:
    xacro_arg: enable_lidar
    default_enabled: true
    bridge_group: lidar
    static_tfs:
      - name: lidar_2d
        parent_frame: lidar_2d_frame
        child_frame: panda/panda_link7/lidar_2d
      - name: lidar_3d
        parent_frame: lidar_3d_frame
        child_frame: panda/panda_link7/lidar_3d
  imu:
    xacro_arg: enable_imu
    default_enabled: true
    bridge_group: imu
    static_tfs:
      - name: imu
        parent_frame: imu_link
        child_frame: panda/panda_link7/imu
