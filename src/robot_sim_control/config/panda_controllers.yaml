controller_manager:
  ros__parameters:
    update_rate: 250

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    use_local_topics: false

arm_controller:
  ros__parameters:
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    open_loop_control: false
    constraints:
      goal_time: 1.0
      stopped_velocity_tolerance: 0.02
      panda_joint1:
        trajectory: 0.2
        goal: 0.05
      panda_joint2:
        trajectory: 0.2
        goal: 0.05
      panda_joint3:
        trajectory: 0.2
        goal: 0.05
      panda_joint4:
        trajectory: 0.2
        goal: 0.05
      panda_joint5:
        trajectory: 0.2
        goal: 0.05
      panda_joint6:
        trajectory: 0.2
        goal: 0.05
      panda_joint7:
        trajectory: 0.2
        goal: 0.05

gripper_controller:
  ros__parameters:
    joints:
      - panda_finger_joint1
      - panda_finger_joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
