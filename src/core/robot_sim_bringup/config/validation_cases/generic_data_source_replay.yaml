schema: 4
kind: validation_case
name: generic_data_source_replay
description: Validate v4 data_source references by replaying a message sequence onto a topic.
system:
  profile: minimal_pipeline
inputs:
  - type: data_source
    name: example_status_input
    source: example_message_sequence
    repeat: true
actions:
  - name: allow_replay
    type: sleep
    duration_sec: 0.5
assertions:
  - name: status_topic_receives_messages
    type: topic
    topic: /example/status
    message_type: std_msgs/msg/String
    min_count: 1
    timeout_sec: 3.0
    expect:
      data:
        exists: true
artifacts:
  rosbag:
    enabled: false
  reports: [md, html, json]
