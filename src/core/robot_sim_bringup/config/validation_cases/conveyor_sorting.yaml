schema: 3
kind: validation_case
name: conveyor_sorting
description: Conveyor pick-window to bin sorting validation with deterministic parcel targets.

launch:
  profile: panda
  mode: full
  layout: single
  timeout_sec: 120.0
  sensor_overrides: ""

scene:
  package: robot_sim_scenarios
  path: scenes/conveyor_sorting.yaml

task:
  type: conveyor_sorting
  seed: 29
  start_region: pick_window
  goal_region: left_sort_approach
  sort_targets:
    red: left_sort_bin
    blue: right_sort_bin
  conveyor:
    command_topic: /conveyor/cmd_vel
    speed_mps: 0.45
    pick_window_region: pick_window
  moveit:
    group: panda_arm
    target_link: panda_link8
    frame: world
    planning_time_sec: 10.0
    velocity_scaling: 0.18
    acceleration_scaling: 0.18
    execute: false

planning_scene:
  apply: true
  exclude_tags: [ground, robot_mount, pedestal, visual_marker, optional, conveyor, dynamic_surface, dynamic_object, parcel, pick_object]
  include_tags: []

expect:
  position_tolerance_m: 0.18
  orientation_tolerance_rad: 3.14159
  max_goal_position_error_m: 0.35
  min_tcp_clearance_m: 0.02
  max_controller_error_rad: 0.60
  required_sensor_min_hz: 1.0
  require_tf_ok: true
  topics:
    - name: /camera/color/image_raw
      min_hz: 1.0
    - name: /camera/points
      min_hz: 1.0

artifacts:
  rosbag:
    enabled: true
    topic_group: all
    compression: false
    extra_topics:
      - /conveyor/cmd_vel
  reports: [md, html]
