schema: 4
kind: validation_case
name: generic_command_smoke
description: Validate the schema v4 platform runner with a generic command action.
system:
  profile: minimal_pipeline
actions:
  - name: echo_command
    type: command
    command:
      - python3
      - -c
      - "print('robot_sim generic smoke ${run_label}')"
    timeout_sec: 10.0
assertions:
  - name: echo_command_returncode
    type: action_result
    action: echo_command
    expect:
      returncode:
        equals: 0
artifacts:
  rosbag:
    enabled: false
  reports: [md, html, json]
