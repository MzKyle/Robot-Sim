schema: 2
kind: validation_case
name: industrial_planning_goal
description: Fanuc industrial cell obstacle-aware move from planning start to planning goal.

launch:
  profile: fanuc_m20id12l_industrial_cell
  mode: full
  layout: single
  timeout_sec: 120.0
  sensor_overrides: ""

scene:
  package: robot_sim_scenarios
  path: scenes/industrial_cell.yaml

task:
  type: moveit_region_to_region
  seed: 11
  start_region: planning_start
  goal_region: planning_goal
  moveit:
    group: manipulator
    target_link: tool0
    frame: world
    planning_time_sec: 8.0
    velocity_scaling: 0.2
    acceleration_scaling: 0.2

planning_scene:
  apply: true
  exclude_tags: [ground, robot_mount, pedestal, visual_marker, optional]
  include_tags: []

expect:
  position_tolerance_m: 0.15
  orientation_tolerance_rad: 3.14159
  max_goal_position_error_m: 0.30
  min_tcp_clearance_m: 0.02
  max_controller_error_rad: 0.50
  required_sensor_min_hz: 1.0
  require_tf_ok: true
  topics:
    - name: /camera/color/image_raw
      min_hz: 1.0
    - name: /camera/points
      min_hz: 1.0
    - name: /scan
      min_hz: 1.0
    - name: /imu/data
      min_hz: 1.0

artifacts:
  rosbag:
    enabled: true
    topic_group: all
    compression: false
    extra_topics: []
  reports: [md, html]
