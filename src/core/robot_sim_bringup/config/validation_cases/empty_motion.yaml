schema: 3
kind: validation_case
name: empty_motion
description: Panda empty-scene smoke motion through deterministic workspace waypoints.

launch:
  profile: panda
  mode: full
  layout: single
  timeout_sec: 120.0
  sensor_overrides: ""

scene:
  package: robot_sim_scenarios
  path: scenes/debug_empty.yaml

task:
  type: empty_motion
  seed: 5
  waypoints: [workspace_sample, workspace_sample]
  moveit:
    group: panda_arm
    target_link: panda_link8
    frame: world
    planning_time_sec: 6.0
    velocity_scaling: 0.2
    acceleration_scaling: 0.2

planning_scene:
  apply: false
  exclude_tags: [ground, robot_mount, pedestal, visual_marker, optional]
  include_tags: []

expect:
  position_tolerance_m: 0.18
  orientation_tolerance_rad: 3.14159
  max_goal_position_error_m: 0.35
  min_tcp_clearance_m: 0.0
  max_controller_error_rad: 0.60
  required_sensor_min_hz: 1.0
  require_tf_ok: true
  topics:
    - name: /camera/color/image_raw
      min_hz: 1.0

artifacts:
  rosbag:
    enabled: true
    topic_group: all
    compression: false
    extra_topics: []
  reports: [md, html]
