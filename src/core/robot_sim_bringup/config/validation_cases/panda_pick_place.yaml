schema: 3
kind: validation_case
name: panda_pick_place
description: Panda gripper pick-place validation on the tabletop scene.

launch:
  profile: panda
  mode: full
  layout: single
  timeout_sec: 120.0
  sensor_overrides: ""

scene:
  package: robot_sim_scenarios
  path: scenes/tabletop_pick_place.yaml

task:
  type: pick_place
  seed: 13
  pick_region: pick_spawn
  place_region: place_target
  object:
    model: pick_red_cube
    attach_link: panda_link8
  gripper:
    controller: gripper_controller
    open_positions: [0.04, 0.04]
    closed_positions: [0.0, 0.0]
  moveit:
    group: panda_arm
    target_link: panda_link8
    frame: world
    planning_time_sec: 8.0
    velocity_scaling: 0.2
    acceleration_scaling: 0.2

planning_scene:
  apply: true
  exclude_tags: [ground, robot_mount, pedestal, visual_marker, optional]
  include_tags: []

expect:
  position_tolerance_m: 0.12
  orientation_tolerance_rad: 3.14159
  max_goal_position_error_m: 0.25
  min_tcp_clearance_m: 0.01
  max_controller_error_rad: 0.50
  required_sensor_min_hz: 1.0
  require_tf_ok: true
  topics:
    - name: /camera/color/image_raw
      min_hz: 1.0
    - name: /camera/points
      min_hz: 1.0

artifacts:
  rosbag:
    enabled: true
    topic_group: all
    compression: false
    extra_topics: []
  reports: [md, html]
