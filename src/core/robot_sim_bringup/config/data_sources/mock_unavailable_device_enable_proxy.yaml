schema: 4
kind: data_source
name: mock_unavailable_device_enable_proxy
description: Standard ROS service proxy that simulates an unavailable lower-level device.
type: service_source
service_type: std_srvs/srv/SetBool
service: /mock/unavailable_device/set_enabled
proxy:
  target_service: /mock/missing_lower_device/set_enabled
  timeout_sec: 0.2
  request_map:
    data: request.data
  response_map:
    success: response.success
    message: response.message
  fallback_response:
    success: false
    message: lower device unavailable
