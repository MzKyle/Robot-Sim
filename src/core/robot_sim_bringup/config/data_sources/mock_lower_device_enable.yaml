schema: 4
kind: data_source
name: mock_lower_device_enable
description: Standard ROS service stub that simulates a lower-level device enable endpoint.
type: service_source
service_type: std_srvs/srv/SetBool
service: /mock/lower_device/set_enabled
responses:
  - match:
      data:
        equals: true
    response:
      success: true
      message: lower device enabled
  - match:
      data:
        equals: false
    response:
      success: true
      message: lower device disabled
default_response:
  success: false
  message: unsupported request
