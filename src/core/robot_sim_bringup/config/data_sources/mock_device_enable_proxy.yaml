schema: 4
kind: data_source
name: mock_device_enable_proxy
description: Standard ROS service proxy that forwards device enable requests to a lower-level service.
type: service_source
service_type: std_srvs/srv/SetBool
service: /mock/device/set_enabled
proxy:
  target_service: /mock/lower_device/set_enabled
  timeout_sec: 1.0
  request_map:
    data: request.data
  response_map:
    success: response.success
    message: response.message
  fallback_response:
    success: false
    message: lower device unavailable
