schema: 3
kind: sim_profile
name: custom_robot

metadata:
  package: your_robot_bringup
  robot_name: custom_robot
  vendor: custom
  model: custom_robot

capabilities:
  task_families:
    - empty_motion
    - obstacle_clearance
  sensors: [camera, depth, lidar, imu]

end_effector:
  planning_group: manipulator
  tool_link: tool0
  base_frame: world

layouts:
  single:
    world: single
    namespaces:
      robot: ""
      sensors: ""
      supervisor: ""
  distributed:
    world: distributed
    namespaces:
      robot: robot
      sensors: sensors
      supervisor: supervisor

robot:
  xacro:
    package: your_robot_description
    path: robots/your_robot.urdf.xacro
  spawn_name: custom_robot
  spawn_node_name: spawn_custom_robot
  allow_renaming: false
  xacro_args:
    mesh_root:
      package: your_robot_description
      path: models/your_robot/meshes
      uri: file

worlds:
  single:
    world_preset:
      package: robot_sim_scenarios
      path: world_presets/lab_demo.yaml
  distributed:
    world_preset:
      package: robot_sim_scenarios
      path: world_presets/lab_demo.yaml

gazebo:
  launch:
    package: ros_gz_sim
    path: launch/gz_sim.launch.py
  gz_version: "8"
  on_exit_shutdown: "true"
  args:
    gui: "-r "
    headless: "-r -s "
  resource_env_vars:
    - GZ_SIM_RESOURCE_PATH
    - IGN_GAZEBO_RESOURCE_PATH
  resource_paths:
    - package: your_robot_description
    - package: your_robot_description
      path: models
    - package: robot_sim_scenarios
    - package: robot_sim_scenarios
      path: assets

control:
  controllers_file:
    package: your_robot_control
    path: config/your_robot_controllers.yaml
  controller_manager_name: controller_manager
  hardware_plugins:
    gazebo: gz_ros2_control/GazeboSimSystem
    mock: mock_components/GenericSystem
  spawners:
    - name: joint_state_broadcaster
      type: joint_state_broadcaster/JointStateBroadcaster
      timeout: 90
    - name: arm_controller
      type: joint_trajectory_controller/JointTrajectoryController
      timeout: 90

