schema: 2
kind: world_preset
name: lab_demo
world_name: robot_lab
description: Default generic lab scene assembled from reusable assets.

base:
  package: robot_sim_scenarios
  path: worlds/base/lab.world.sdf

scenario:
  type: generic_lab
  task_family: simulation

assets:
  - name: work_table
    package: robot_sim_scenarios
    path: assets/work_table/model.sdf
    pose: [0.95, 0, 0.04, 0, 0, 0]
    tags: [table]
  - name: test_beam
    package: robot_sim_scenarios
    path: assets/test_beam/model.sdf
    pose: [0.95, 0, 0.10, 0, 0, 0]
    tags: [workpiece]
  - name: calibration_board
    package: robot_sim_scenarios
    path: assets/calibration_board/model.sdf
    pose: [1.05, -0.32, 0.32, 0, 0.35, 0]
    tags: [calibration]
  - name: target_red_box
    package: robot_sim_scenarios
    path: assets/target_red_box/model.sdf
    pose: [0.86, -0.16, 0.18, 0, 0, 0]
    tags: [target, perception]
  - name: target_green_cylinder
    package: robot_sim_scenarios
    path: assets/target_green_cylinder/model.sdf
    pose: [1.08, 0.17, 0.19, 0, 0, 0]
    tags: [target, perception]
