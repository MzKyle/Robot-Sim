schema: 3
kind: world_preset
name: planning_obstacles
world_name: robot_lab
description: Motion planning scene with simple obstacles.

base:
  package: robot_sim_scenarios
  path: worlds/base/lab.world.sdf

scenario:
  type: planning_obstacles
  task_family: planning

assets:
  - name: work_table
    package: robot_sim_scenarios
    path: assets/work_table/model.sdf
    pose: [0.95, 0, 0.04, 0, 0, 0]
    tags: [table]
  - name: planning_column_a
    package: robot_sim_scenarios
    path: assets/planning_column/model.sdf
    pose: [0.68, -0.18, 0.315, 0, 0, 0]
    tags: [obstacle]
  - name: planning_column_b
    package: robot_sim_scenarios
    path: assets/planning_column/model.sdf
    pose: [1.13, 0.22, 0.315, 0, 0, 0]
    tags: [obstacle]
